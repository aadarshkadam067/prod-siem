# ============================================================
# prod-siem — Infrastructure stack
# ============================================================
# Default:    docker compose up -d           (ES + Redis only — fast)
# Full SOAR:  docker compose --profile full up -d   (adds TheHive/Cortex/Cassandra)
#
# Container names match those expected by run.sh / health_check.sh / stop.sh
# (do not rename without auditing those scripts first).
# ============================================================

services:

  # -------- Elasticsearch (alerts, cases, events store) --------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=siem-cluster
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sfu elastic:${ELASTICSEARCH_PASSWORD:-changeme} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # -------- Redis (cache, queue, WebSocket pub/sub) --------
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -------- Kibana (optional ES inspector) --------
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    profiles: ["full", "kibana"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-changeme}
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch: { condition: service_healthy }
    restart: unless-stopped

  # -------- Cassandra (TheHive backend) --------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    profiles: ["full"]
    environment:
      - CASSANDRA_CLUSTER_NAME=thehive
      - HEAP_NEWSIZE=256M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandradata:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # -------- TheHive (case management) --------
  thehive:
    image: strangebee/thehive:5.3
    container_name: thehive
    profiles: ["full"]
    depends_on:
      cassandra:     { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
    volumes:
      - thehivedata:/opt/thp/thehive/data
    ports:
      - "9000:9000"
    command:
      - --secret
      - "${THEHIVE_SECRET:-ChangeThisInProduction!}"
      - --cql-hostnames
      - cassandra
      - --index-backend
      - elasticsearch
      - --es-hostnames
      - elasticsearch
      - --es-username
      - elastic
      - --es-password
      - "${ELASTICSEARCH_PASSWORD:-changeme}"
    restart: unless-stopped

  # -------- Cortex (analyzer engine) --------
  cortex:
    image: thehiveproject/cortex:3.1.8
    container_name: cortex
    profiles: ["full"]
    depends_on:
      elasticsearch: { condition: service_healthy }
    volumes:
      - cortexdata:/var/cortex
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9001:9001"
    environment:
      - JVM_OPTS=-Xms512m -Xmx512m
    restart: unless-stopped

volumes:
  esdata:
  redisdata:
  cassandradata:
  thehivedata:
  cortexdata:
